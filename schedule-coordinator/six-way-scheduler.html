<title>6명 회의 시간 찾기</title>
<style>
  :root{
    --ink:#171A21; --paper:#F5F6F8; --panel:#FFFFFF;
    --gray:#6C727C; --gray-2:#9AA0A8; --line:#E7E9ED; --line-2:#EFF1F3;
    --accent:#1F2A44; --accent-soft:#EAEDF3;
    --ok:#2E8B57;   --ok-bg:#E7F2EB;
    --avoid:#C0871F; --avoid-bg:#F8EFDA;
    --unsure:#8B929C; --unsure-bg:#EEF0F3;
    --no:#B04A34;   --no-bg:#F5E7E2;
    --sans:"Pretendard","Apple SD Gothic Neo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body,html{margin:0;padding:0;}
  .app{font-family:var(--sans);color:var(--ink);background:var(--paper);min-height:100vh;
       padding:40px 24px 80px;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}
  .wrap{max-width:1000px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-2);font-weight:700;}
  h1{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:8px 0 6px;text-wrap:balance;}
  .lede{color:var(--gray);font-size:15px;max-width:60ch;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}

  /* context bar */
  .ctx{display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;margin:26px 0 20px;
       padding:16px 18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;}
  .ctx .meta{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--gray);}
  .ctx .meta b{color:var(--ink);font-weight:700;}
  .ctx .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--gray-2);}
  .att{display:flex;flex-wrap:wrap;gap:7px;margin-left:auto;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 9px 5px 5px;border-radius:20px;
        font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;}
  .chip .av{width:20px;height:20px;border-radius:50%;color:#fff;display:flex;align-items:center;
        justify-content:center;font-size:10px;font-weight:700;}
  .chip .rr{font-size:9px;letter-spacing:.03em;padding:1px 5px;border-radius:5px;font-weight:700;}
  .chip.req .rr{background:var(--accent-soft);color:var(--accent);}
  .chip.opt{color:var(--gray);}
  .chip.opt .rr{background:var(--line-2);color:var(--gray-2);}

  /* legend — the thesis */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}
  .lg{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--panel);
      border:1px solid var(--line);font-size:12px;}
  .lg .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
  .lg b{font-weight:700;}
  .lg span{color:var(--gray);}
  .sw.ok{background:var(--ok);}
  .sw.avoid{background:var(--avoid);}
  .sw.unsure{background:repeating-linear-gradient(45deg,var(--unsure),var(--unsure) 2px,#fff 2px,#fff 4px);border:1px solid var(--unsure);}
  .sw.no{background:var(--no-bg);border:1px solid var(--no);}

  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:20px;align-items:start;}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;}
  /* hero recommendation */
  .hero{padding:22px 22px 20px;}
  .hero .head{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;}
  .hero .rank{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--ok);}
  .hero.imperf .rank{color:var(--avoid);}
  .hero .time{font-size:26px;font-weight:800;letter-spacing:-.01em;margin-top:3px;}
  .hero .time .d{color:var(--gray-2);font-weight:600;font-size:20px;}
  .status{margin-left:auto;text-align:right;flex-shrink:0;}
  .status .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:20px;
        font-size:12px;font-weight:700;}
  .pill.good{background:var(--ok-bg);color:var(--ok);}
  .pill.warn{background:var(--avoid-bg);color:var(--avoid);}
  .status .sub{font-size:11.5px;color:var(--gray-2);margin-top:6px;}

  .people{display:flex;flex-direction:column;gap:2px;}
  .prow{display:flex;align-items:center;gap:11px;padding:10px 6px;border-top:1px solid var(--line-2);}
  .prow:first-child{border-top:none;}
  .prow .av{width:28px;height:28px;border-radius:50%;color:#fff;display:flex;align-items:center;
        justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .prow .nm{font-weight:600;font-size:13.5px;}
  .prow .role{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:2px;}
  .role.req{background:var(--accent-soft);color:var(--accent);}
  .role.opt{background:var(--line-2);color:var(--gray-2);}
  .prow .reason{color:var(--gray);font-size:12px;margin-left:2px;}
  .tier{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
        padding:4px 10px;border-radius:20px;flex-shrink:0;}
  .tier .tk{width:8px;height:8px;border-radius:50%;}
  .tier.ok{background:var(--ok-bg);color:var(--ok);} .tier.ok .tk{background:var(--ok);}
  .tier.avoid{background:var(--avoid-bg);color:var(--avoid);} .tier.avoid .tk{background:var(--avoid);}
  .tier.unsure{background:var(--unsure-bg);color:var(--unsure);} .tier.unsure .tk{background:var(--unsure);}
  .tier.no{background:var(--no-bg);color:var(--no);} .tier.no .tk{background:var(--no);}

  .confirm{display:flex;gap:10px;margin-top:18px;}
  .btn{border:none;font-family:inherit;font-weight:700;border-radius:11px;padding:13px 18px;font-size:14px;cursor:pointer;
       transition:transform .06s ease,filter .15s ease;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--accent);color:#fff;flex:1;}
  .btn.primary:hover{filter:brightness(1.12);}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--gray-2);}

  /* imperfect banner */
  .banner{margin-top:16px;padding:14px 15px;border-radius:12px;background:var(--avoid-bg);
          border:1px solid #EBD9AE;font-size:13px;color:#7C5A12;}
  .banner b{color:#5E4409;}
  .banner .acts{display:flex;gap:9px;margin-top:12px;}
  .banner .btn{padding:10px 14px;font-size:13px;}
  .banner .btn.primary{background:var(--avoid);flex:none;}
  .banner .btn.ghost{background:#fff;border-color:#E4CE9B;color:#7C5A12;}

  /* aside: alternatives */
  aside h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-2);font-weight:700;
        margin:2px 0 12px 2px;}
  .alt{width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:13px;
       padding:14px 15px;margin-bottom:10px;cursor:pointer;font-family:inherit;transition:border-color .15s,box-shadow .15s;}
  .alt:hover{border-color:var(--gray-2);}
  .alt.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);cursor:default;}
  .alt .t{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .alt .t .when{font-weight:700;font-size:14px;}
  .alt .t .when .d{color:var(--gray-2);font-weight:600;font-size:12px;}
  .alt .t .flag{font-size:11px;font-weight:700;}
  .alt .flag.good{color:var(--ok);} .alt .flag.warn{color:var(--avoid);}
  .alt .dots{display:flex;gap:5px;margin-top:11px;}
  .dt{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .dt.ok{background:var(--ok);} .dt.avoid{background:var(--avoid);}
  .dt.unsure{background:#fff;border:1.5px solid var(--unsure);}
  .dt.no{background:var(--no-bg);border:1.5px solid var(--no);}
  .alt .note{font-size:11.5px;color:var(--gray);margin-top:9px;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);opacity:0;
         background:var(--accent);color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:600;
         box-shadow:0 8px 30px rgba(23,26,33,.28);transition:all .3s ease;pointer-events:none;z-index:50;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .foot{margin-top:30px;color:var(--gray-2);font-size:12px;text-align:center;}
</style>

<div class="app">
  <div class="wrap">
    <div class="eyebrow">6명 회의 · 다음 주 · 1시간</div>
    <h1>모두에게 괜찮은 시간을 먼저 찾고 잡습니다</h1>
    <p class="lede">빈 시간이 곧 가능한 시간은 아닙니다. 6명의 근무 패턴과 선호를 한 번에 읽어,
       <b>필참 전원이 가능하면서 가장 덜 불편한 시간</b>을 이유와 함께 제안해요.</p>

    <!-- context -->
    <div class="ctx">
      <div class="meta">
        <b>제품팀 스프린트 리뷰</b><span class="dot"></span>
        <span class="mono">1시간</span><span class="dot"></span>
        <span>다음 주 (7.20–7.24)</span>
      </div>
      <div class="att" id="att"></div>
    </div>

    <!-- legend = thesis -->
    <div class="legend">
      <div class="lg"><span class="sw ok"></span><b>괜찮음</b><span>편하게 가능</span></div>
      <div class="lg"><span class="sw avoid"></span><b>피하고 싶음</b><span>되지만 불편 (이유)</span></div>
      <div class="lg"><span class="sw unsure"></span><b>재실 불확실</b><span>자율출근·코어 밖</span></div>
      <div class="lg"><span class="sw no"></span><b>안 됨</b><span>일정·외근</span></div>
    </div>

    <div class="grid">
      <!-- hero -->
      <section class="card hero" id="hero"></section>

      <!-- alternatives -->
      <aside>
        <h2>다른 후보</h2>
        <div id="alts"></div>
      </aside>
    </div>

    <p class="foot">필참자가 모두 ‘괜찮음’으로 겹치는 완벽한 시간은 드뭅니다. 시스템은 근거를 제시하고, 최종 결정은 사람이 합니다.</p>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  const REQ=['정민경','최성욱','김도현','윤지수'], OPT=['김명국','이용석'];
  const AV={정민경:'#B04A34',최성욱:'#2E6B8B',김도현:'#4A5AA8',윤지수:'#2E8B57',김명국:'#8A5AA0',이용석:'#B08A2E'};
  const TL={ok:'괜찮음',avoid:'피하고 싶음',unsure:'재실 불확실',no:'안 됨'};
  const initial=n=>n[0];

  // 큐레이션된 후보 (엔진 산출을 반영한 실데이터 형식)
  const CANDS=[
    {id:'a',day:'화',date:'7.21',s:'오후 2:00',e:'오후 3:00',
     p:{정민경:['ok',''],최성욱:['avoid','외부 미팅 직후'],김도현:['ok',''],윤지수:['ok',''],김명국:['ok',''],이용석:['ok','']}},
    {id:'b',day:'금',date:'7.24',s:'오후 3:00',e:'오후 4:00',
     p:{정민경:['ok',''],최성욱:['ok',''],김도현:['ok',''],윤지수:['avoid','금요일 오후 조기 퇴근'],김명국:['ok',''],이용석:['no','반차']}},
    {id:'c',day:'화',date:'7.21',s:'오전 10:00',e:'오전 11:00',
     p:{정민경:['ok',''],최성욱:['ok',''],김도현:['avoid','오전 집중근무'],윤지수:['ok',''],김명국:['ok',''],이용석:['unsure','자율출근·재실 미확정']}}
  ];
  const PERFECT={id:'p',day:'화',date:'7.28',s:'오후 2:00',e:'오후 3:00',widened:true,
     p:{정민경:['ok',''],최성욱:['ok',''],김도현:['ok',''],윤지수:['ok',''],김명국:['ok',''],이용석:['ok','']}};

  const isPerfect=c=>REQ.every(n=>c.p[n][0]==='ok');
  const reqAvail=c=>REQ.filter(n=>c.p[n][0]!=='no').length;
  const avoidNames=c=>[...REQ,...OPT].filter(n=>c.p[n][0]==='avoid');
  let order=[...CANDS], selected='a', asked=false;

  // context chips
  document.getElementById('att').innerHTML=
    REQ.map(n=>`<span class="chip req"><span class="av" style="background:${AV[n]}">${initial(n)}</span>${n}<span class="rr">필참</span></span>`).join('')+
    OPT.map(n=>`<span class="chip opt"><span class="av" style="background:${AV[n]}">${initial(n)}</span>${n}<span class="rr">선택</span></span>`).join('');

  function heroHTML(c){
    const perfect=isPerfect(c);
    const av=avoidNames(c);
    const statusPill=perfect
      ? `<span class="pill good"><span class="tk" style="width:8px;height:8px;border-radius:50%;background:var(--ok)"></span>필참 전원 괜찮음</span>`
      : `<span class="pill warn">필참 ${reqAvail(c)}/${REQ.length} 가능 · ${av.length}명 피하고 싶음</span>`;
    const rows=[...REQ,...OPT].map(n=>{
      const [t,r]=c.p[n];
      return `<div class="prow">
        <span class="av" style="background:${AV[n]}">${initial(n)}</span>
        <span class="nm">${n}</span><span class="role ${REQ.includes(n)?'req':'opt'}">${REQ.includes(n)?'필참':'선택'}</span>
        ${r?`<span class="reason">· ${r}</span>`:''}
        <span class="tier ${t}"><span class="tk"></span>${TL[t]}</span>
      </div>`;
    }).join('');
    const banner=perfect?'':`
      <div class="banner">
        완벽히 맞는 시간이 없어요. <b>임의로 정하지 않을게요.</b> 어떻게 할까요?
        <div class="acts">
          <button class="btn ghost" data-act="widen">범위를 넓혀 다시 찾기</button>
          <button class="btn primary" data-act="ask">${av[0]||''}님께 양해 요청</button>
        </div>
      </div>`;
    return `<div class="head">
        <div>
          <div class="rank">${perfect?'추천 · 전원 가능':'가장 근접한 후보'}</div>
          <div class="time">${c.day} <span class="d mono">${c.date}</span> · <span class="mono">${c.s}–${c.e}</span></div>
        </div>
        <div class="status">${statusPill}<div class="sub">${perfect?'재조율 위험 낮음':'점심 직후 아님 · 코어타임'}</div></div>
      </div>
      <div class="people">${rows}</div>
      ${banner}
      <div class="confirm">
        <button class="btn primary" data-act="confirm">이 시간으로 확정 · 6명에게 초대</button>
        <button class="btn ghost" data-act="edit">시간 직접 고르기</button>
      </div>`;
  }

  function altHTML(c){
    const perfect=isPerfect(c);
    const dots=[...REQ,...OPT].map(n=>`<span class="dt ${c.p[n][0]}" title="${n}: ${TL[c.p[n][0]]}"></span>`).join('');
    const av=avoidNames(c);
    const note=perfect?'필참·선택 전원 괜찮음'
      :(av.length?`${av.map(n=>c.p[n][0]==='avoid'?n:'').filter(Boolean).join(', ')} 피하고 싶음`:'');
    return `<button class="alt ${c.id===selected?'on':''}" data-sel="${c.id}">
      <div class="t"><span class="when">${c.day} <span class="d mono">${c.date}</span> · <span class="mono">${c.s}</span></span>
        <span class="flag ${perfect?'good':'warn'}">${perfect?'전원 가능':`필참 ${reqAvail(c)}/${REQ.length}`}</span></div>
      <div class="dots">${dots}</div>
      ${note?`<div class="note">${note}</div>`:''}
    </button>`;
  }

  function render(){
    const c=order.find(x=>x.id===selected)||order[0];
    const hero=document.getElementById('hero');
    hero.className='card hero'+(isPerfect(c)?'':' imperf');
    hero.innerHTML=heroHTML(c);
    document.getElementById('alts').innerHTML=order.filter(x=>x.id!==selected).map(altHTML).join('');
  }
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

  document.body.addEventListener('click',e=>{
    const sel=e.target.closest('[data-sel]'); if(sel){selected=sel.dataset.sel;render();return;}
    const act=e.target.closest('[data-act]'); if(!act)return;
    const a=act.dataset.act, c=order.find(x=>x.id===selected);
    if(a==='widen'){
      if(!order.some(x=>x.id==='p')){order=[PERFECT,...order];}
      selected='p'; render();
      toast('범위를 7.27–7.31로 넓혀 전원 괜찮은 시간을 찾았어요');
    }else if(a==='ask'){
      const n=avoidNames(c)[0];
      toast(`${n}님께 확인 요청을 보냈어요 · 응답 오면 알려드릴게요`);
    }else if(a==='confirm'){
      toast(`${c.day} ${c.date} ${c.s} 확정 · 6명에게 초대를 보냈어요`);
    }else if(a==='edit'){
      toast('시간을 직접 고르는 화면은 다음 단계예요');
    }
  });
  render();
})();
</script>
